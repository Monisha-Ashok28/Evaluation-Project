<!DOCTYPE html>
<html>
<head>
    <title>AI Form</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<div class="container mt-5">
    <h2>AI Form Assistant</h2>

    <input id="name" class="form-control mb-2" placeholder="Enter Name">
    <input id="email" class="form-control mb-2" placeholder="Enter Email">
    <textarea id="msg" class="form-control mb-2" placeholder="Enter Message"></textarea>

    <button onclick="validate()" class="btn btn-primary">Submit</button>

    <div id="result" class="mt-3 text-danger"></div>
</div>

<script>
function validate() {
    let name = document.getElementById("name").value;
    let email = document.getElementById("email").value;
    let msg = document.getElementById("msg").value;

    let errors = [];

    if (name[0] !== name[0].toUpperCase())
        errors.push("Name should start with capital");

    if (!email.includes("@"))
        errors.push("Invalid email");

    if (msg.length < 10)
        errors.push("Message too short");

    let result = document.getElementById("result");

    if (errors.length === 0)
        result.innerHTML = "✅ Looks good!";
    else
        result.innerHTML = errors.join("<br>");
}
</script>

</body>
</html>
