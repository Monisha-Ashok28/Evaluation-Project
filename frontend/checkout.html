<!DOCTYPE html>
<html>
<head>
    <title>Checkout</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body style="background:#f5f7fa;">

<div class="container mt-5">
    <h2>📦 Delivery Address</h2>

    <input id="name" class="form-control my-2" placeholder="Full Name">
    <input id="phone" class="form-control my-2" placeholder="Phone Number">
    <textarea id="address" class="form-control my-2" placeholder="Full Address"></textarea>

    <button onclick="placeOrder()" class="btn btn-primary w-100 mt-3">
        Place Order
    </button>
</div>

<script src="script.js"></script>
</body>
</html>
