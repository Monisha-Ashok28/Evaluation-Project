<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<div class="container mt-5">
    <h2>Login</h2>

    <input id="user" class="form-control mb-2" placeholder="Username">
    <input id="pass" type="password" class="form-control mb-2" placeholder="Password">

    <button onclick="login()" class="btn btn-success">Login</button>
</div>

<script>
function login() {
    let u = document.getElementById("user").value;
    let p = document.getElementById("pass").value;

    if (u === "admin" && p === "Admin@123") {
        localStorage.setItem("loggedIn", true);
        alert("Login successful");
        window.location.href = "index.html";
    } else {
        alert("Invalid username or password");
    }
}
</script>

</body>
</html>
